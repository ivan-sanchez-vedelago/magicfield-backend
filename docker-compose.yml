services:
  postgres:
    image: postgres:16
    container_name: magic_field-postgres
    environment:
      POSTGRES_DB: magic_field
      POSTGRES_USER: MagicFieldAdmin
      POSTGRES_PASSWORD: MagicField
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MagicFieldAdmin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
